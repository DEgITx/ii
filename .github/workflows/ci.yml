name: CMake CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [created]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build-type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Set architecture (Unix)
        if: runner.os != 'Windows'
        run: echo "ARCH_LOWER=$(echo ${{ runner.arch }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set architecture (Windows)
        if: runner.os == 'Windows'
        run: echo "ARCH_LOWER=$('${{ runner.arch }}'.ToLower())" >> $env:GITHUB_ENV

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list cmake &>/dev/null || brew install cmake

      # Раннеры GitHub не несут backend SDK (TFLite/TensorRT/ONNX Runtime),
      # а на Linux Wayland/V4L2 потянули бы libwayland-dev и т.п. Поэтому в CI
      # собираем только встроенный pure-C++ движок `ii` (USE_II_ENGINE, ON по
      # умолчанию) и отключаем всё, что требует внешних библиотек. Этого
      # достаточно: тесты и движок backend-нейтральны и собираются везде.
      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DBUILD_TESTS=ON \
            -DUSE_TFLITE=OFF \
            -DUSE_DISPLAY=OFF \
            -DUSE_CAMERA=OFF

      - name: Configure CMake (non-Linux)
        if: runner.os != 'Linux'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DBUILD_TESTS=ON -DUSE_TFLITE=OFF

      - name: Build
        run: |
          cmake --build build --config ${{ matrix.build-type }} --parallel

      - name: Run tests
        working-directory: build
        run: |
          ctest --output-on-failure -C ${{ matrix.build-type }}

      - name: Prepare artifacts (Linux)
        if: runner.os == 'Linux' && matrix.build-type == 'Release'
        run: |
          mkdir -p artifacts/linux/include
          cp build/ii artifacts/linux/
          cp src/*.h artifacts/linux/include/
          cd artifacts
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION=${{ github.ref_name }}
            zip -r ii-linux-${{ env.ARCH_LOWER }}-${VERSION}.zip linux/
          else
            zip -r ii-linux-${{ env.ARCH_LOWER }}.zip linux/
          fi

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows' && matrix.build-type == 'Release'
        run: |
          mkdir -p artifacts/windows/include
          cp build/Release/ii.exe artifacts/windows/
          cp src/*.h artifacts/windows/include/
          cd artifacts
          if ("${{ github.event_name }}" -eq "release") {
            $VERSION = "${{ github.ref_name }}"
            7z a "ii-windows-${{ env.ARCH_LOWER }}-${VERSION}.zip" windows/*
          } else {
            7z a "ii-windows-${{ env.ARCH_LOWER }}.zip" windows/*
          }

      - name: Prepare artifacts (macOS)
        if: runner.os == 'macOS' && matrix.build-type == 'Release'
        run: |
          mkdir -p artifacts/macos/include
          cp build/ii artifacts/macos/
          cp src/*.h artifacts/macos/include/
          cd artifacts
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION=${{ github.ref_name }}
            zip -r ii-macos-${{ env.ARCH_LOWER }}-${VERSION}.zip macos/
          else
            zip -r ii-macos-${{ env.ARCH_LOWER }}.zip macos/
          fi

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux' && matrix.build-type == 'Release' && github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ii-linux-${{ env.ARCH_LOWER }}-${{ github.sha }}
          path: artifacts/linux/
          retention-days: 30

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows' && matrix.build-type == 'Release' && github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ii-windows-${{ env.ARCH_LOWER }}-${{ github.sha }}
          path: artifacts/windows/
          retention-days: 30

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS' && matrix.build-type == 'Release' && github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ii-macos-${{ env.ARCH_LOWER }}-${{ github.sha }}
          path: artifacts/macos/
          retention-days: 30

      - name: Upload to Release (Linux)
        if: runner.os == 'Linux' && matrix.build-type == 'Release' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/ii-linux-${{ env.ARCH_LOWER }}-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release (Windows)
        if: runner.os == 'Windows' && matrix.build-type == 'Release' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/ii-windows-${{ env.ARCH_LOWER }}-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release (macOS)
        if: runner.os == 'macOS' && matrix.build-type == 'Release' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/ii-macos-${{ env.ARCH_LOWER }}-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
